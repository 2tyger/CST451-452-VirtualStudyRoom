spring.application.name=virtualstudyroom

spring.datasource.url=jdbc:postgresql://localhost:5432/virtualstudyroom
spring.datasource.username=postgres
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

app.jwt.secret=change-this-in-env-for-prod-change-this-in-env-for-prod
app.jwt.expiration-ms=86400000

app.cors.allowed-origins=http://localhost:4200

app.rate-limit.room-create.max-requests=3
app.rate-limit.room-create.window-seconds=600
app.rate-limit.chat-send.max-requests=10
app.rate-limit.chat-send.window-seconds=10

app.chat.max-length=500

app.pomodoro.focus-seconds=1500
app.pomodoro.break-seconds=300
