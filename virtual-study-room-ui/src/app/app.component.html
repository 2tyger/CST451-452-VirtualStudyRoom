<div class="mx-auto min-h-screen max-w-[980px] bg-stone-200 px-2 py-2 md:px-4">
  <div class="overflow-hidden border border-stone-500 bg-stone-50">
    <header class="flex items-center justify-between border-b border-stone-500 px-4 py-3">
      <h1 class="text-2xl font-normal leading-none text-stone-900">Virtual Study Room</h1>
      <div *ngIf="isAuthenticated" class="flex items-center gap-2">
        <a
          routerLink="/dashboard"
          class="rounded-full border border-stone-500 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-stone-700 hover:bg-stone-200"
        >
          Dashboard
        </a>
        <a
          routerLink="/profile"
          class="rounded-full border border-stone-500 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-stone-700 hover:bg-stone-200"
        >
          Profile
        </a>
        <button
          type="button"
          (click)="logout()"
          class="rounded-full border border-red-700 bg-red-100 px-3 py-1 text-xs font-semibold uppercase tracking-wide text-red-800 hover:bg-red-200"
        >
          Logout
        </button>
      </div>
    </header>

    <main class="px-3 py-4 md:px-6 md:py-5">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
